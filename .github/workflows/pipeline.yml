name: 🔐 DevSecOps Pipeline

on:
  push:
    branches: [ "main" ]   # ou "Principal" se sua branch tiver esse nome
  pull_request:
    branches: [ "main" ]
  workflow_dispatch:       # permite rodar manualmente pelo botão "Run workflow"

permissions:
  contents: read
  pages: write
  id-token: write

jobs:
  pipeline:
    name: Build, Security and Deploy
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}

    steps:
      # ✅ PASSO 1: Checkout do código
      - name: Checkout code
        uses: actions/checkout@v4

      # ✅ PASSO 2: Build
      - name: Build
        run: |
          echo "Verificando arquivos..."
          ls src/
          echo "Build OK!"

      # 🔍 PASSO 3: Secrets Scanning com Gitleaks
      - name: Secrets Scanning - Gitleaks
        uses: gitleaks/gitleaks-action@v2
        with:
          args: detect --source . --no-git

      # 🔍 PASSO 4: SAST com Semgrep
      - name: SAST - Semgrep
        run: |
          pip install semgrep --quiet
          semgrep scan --config auto --error src/

      # 🧩 PASSO 5: SCA com Grype
      - name: SCA - Grype
        run: |
          curl -sSfL https://raw.githubusercontent.com/anchore/grype/main/install.sh | sh -s -- -b /usr/local/bin
          grype dir:. --fail-on medium

      # 🚀 PASSO 6: Deploy (só roda se tudo passar)
      - name: Configure GitHub Pages
        uses: actions/configure-pages@v4

      - name: Upload artifact
        uses: actions/upload-pages-artifact@v4
        with:
          path: ./src

      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
